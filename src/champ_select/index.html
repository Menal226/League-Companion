<div id="container" hx-swap-oob="true">
  <div id="special-screen">
    <div id="my-team-bans" style="display: none;">
      <img class="bench-champ-icon" id="my-ban-0">
      <img class="bench-champ-icon" id="my-ban-1">
      <img class="bench-champ-icon" id="my-ban-2">
      <img class="bench-champ-icon" id="my-ban-3">
      <img class="bench-champ-icon" id="my-ban-4">
    </div>
    <div id="aram-bench">
      <img class="bench-champ-icon" id="bench-0">
      <img class="bench-champ-icon" id="bench-1">
      <img class="bench-champ-icon" id="bench-2">
      <img class="bench-champ-icon" id="bench-3">
      <img class="bench-champ-icon" id="bench-4">
      <img class="bench-champ-icon" id="bench-5">
      <img class="bench-champ-icon" id="bench-6">
      <img class="bench-champ-icon" id="bench-7">
      <img class="bench-champ-icon" id="bench-8">
      <img class="bench-champ-icon" id="bench-9">
    </div>
    <div id="their-team-bans" style="display: none;">
      <img class="bench-champ-icon" id="their-ban-0">
      <img class="bench-champ-icon" id="their-ban-1">
      <img class="bench-champ-icon" id="their-ban-2">
      <img class="bench-champ-icon" id="their-ban-3">
      <img class="bench-champ-icon" id="their-ban-4">
    </div>
  </div>
  <b id="clock" hx-get="/champ-select/clock" hx-trigger="every 1s" hx-swap="innerHTML" style="display:block; text-align:center; font-size: 3rem;"></b>
  <div id="select-screen">
    <div id="my-team">
      <div class="player-lobby-info" id="my-player-0">
      </div>
      <div class="player-lobby-info" id="my-player-1">
      </div>
      <div class="player-lobby-info" id="my-player-2">
      </div>
      <div class="player-lobby-info" id="my-player-3">
      </div>
      <div class="player-lobby-info" id="my-player-4">
      </div>
    </div>
    <div id="aram-picks">
      <img class="aram-portrait" id="aram-possible-0">
      <img class="aram-portrait" id="aram-possible-1">
      <img class="aram-portrait" id="aram-possible-2">
    </div>
    <div id="their-team">
      <div class="player-lobby-info" id="their-player-0">
      </div>
      <div class="player-lobby-info" id="their-player-1">
      </div>
      <div class="player-lobby-info" id="their-player-2">
      </div>
      <div class="player-lobby-info" id="their-player-3">
      </div>
      <div class="player-lobby-info" id="their-player-4">
      </div>
    </div>
  </div>
</div>
