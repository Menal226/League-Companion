<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Lobby</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    <style>
      .bench-champ-icon {
        height: 5vw;
      }

      #aram-bench {
        display: flex;
        justify-content: center;
      }

      .player-lobby-info {
        display: flex; 
        align-items: center; 
        gap: 1vw;
      }

      .player-champ-icon {
        height: 7vw;
      }

      .player-summoner {
        height: 2vw;
      }

      #special-screen {
        display: flex; 
        justify-content: space-around;
      }

      #select-screen {
        display: flex; 
        justify-content: space-around;
      }
    </style>
  </head>
    
  <body>
    <div hx-ext="sse" sse-connect="/sse" sse-swap="message" hx-swap="none"></div>

    <div>
      <div id="special-screen">
        <div id="my-team-bans">
        </div>
        <div id="aram-bench">
        </div>
        <div id="their-bans">
        </div>
      </div>
      <div id="select-screen">
        <div id="my-team">
          <b>Waiting for champ select to begin</b>
        </div>
        <div id="test-team">
        </div>
        <div id="their-team">
          <b>Waiting for champ select to begin</b>
        </div>
      </div>
    </div>
  </body>
</html>
