<div id="container" hx-swap-oob="true">
  <div id="holder">
    <div>
      <button hx-post="/lobby/queue/start" hx-swap="none">
        Start queue
      </button>
      <button hx-post="/lobby/queue/stop" hx-swap="none">
        Stop queue
      </button>
      <div>
        <input hx-post="/lobby/queue/toggle" hx-swap="none" type="checkbox">
        <b>Auto-accept queue</b>
      </div>
      <b id="queue_timer">Not in queue</b>
    </div>
  </div>
</div>
