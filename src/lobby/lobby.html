<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Client</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  </head>
  <body>
    <div hx-ext="sse" sse-connect="/sse" sse-swap="message" hx-swap="none"></div>
    <div class="container">
      <header>
        <h1>League Companion</h1>
        <span id="status">● Connected</span>
      </header>

      <div class="actions">
        <button hx-post="/queue/start" hx-swap="none">
          Start queue
        </button>
        <button hx-post="/queue/stop" hx-swap="none">
          Stop queue
        </button>
        <div>
          <input hx-post="/queue/toggle" hx-swap="none" type="checkbox">
          <b>Auto-accept queue</b>
        </div>
      </div>
      <b id="queue_timer">Not in queue</b>
    </div>
  </body>
</html>
