<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>League Companion</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <style>
      .bench-champ-icon {
        height: 5vw;
      }

      #aram-bench {
        display: flex;
        justify-content: center;
      }

      .player-lobby-info {
        display: flex; 
        align-items: center; 
        gap: 1vw;
      }

      .player-champ-icon {
        height: 7vw;
      }

      .player-summoner {
        height: 2vw;
      }

      #special-screen {
        display: flex; 
        justify-content: space-around;
      }

      #select-screen {
        display: flex; 
        justify-content: space-around;
      }

      #holder {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

    </style>
  </head>
  <body>
    <div hx-ext="sse" sse-connect="/sse" sse-swap="message" hx-swap="none"></div>
    <div id="container" hx-swap-oob="true">
      <div id="holder">
        <div>
          <button hx-post="/lobby/queue/start" hx-swap="none">
            Start queue
          </button>
          <button hx-post="/lobby/queue/stop" hx-swap="none">
            Stop queue
          </button>
          <div>
            <input hx-post="/lobby/queue/toggle" hx-swap="none" type="checkbox">
            <b>Auto-accept queue</b>
          </div>
          <b id="queue_timer">Not in queue</b>
        </div>
      </div>
    </div>
  </body>
</html>
