<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>League Companion</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div hx-ext="sse" sse-connect="/sse" sse-swap="message" hx-swap="none"></div>
    <div id="container" hx-swap-oob="true">
      <img id="lobby-bg" style="display: none;">
      <div id="holder">
        <div id="instant-buttons">
          <button hx-post="/lobby/create/2400" hx-swap="none">Start ARAM - Mayhem</button>
          <button hx-post="/lobby/create/480" hx-swap="none">Start Swiftplay</button>
          <button hx-post="/lobby/create/420" hx-swap="none">Start SoloQ</button>
        </div>
        <div id="queue-control">
          <div>
            <button hx-post="/lobby/queue/start" hx-swap="none">
              Start queue
            </button>
            <button hx-post="/lobby/queue/stop" hx-swap="none">
              Stop queue
            </button>
          </div>
          <div>
            <input hx-post="/lobby/queue/toggle" hx-swap="none" type="checkbox" id="auto-accept-switch">
            <b>Auto-accept queue</b>
          </div>
          <b id="queue_timer">Not in queue</b>
        </div>
      </div>
    </div>
  </body>
</html>
